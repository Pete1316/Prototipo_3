<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monitoreo de Sensores</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="estilo.css">
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#3b82f6" />

  <style>
    /* Estilos básicos para dashboard y alertas */
    body { font-family: 'Inter', sans-serif; background: #f3f4f6; margin:0; padding:0;}
    .container { max-width: 900px; margin: auto; padding: 20px; }
    header { text-align: center; margin-bottom: 20px; }
    .sensor-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(130px,1fr)); gap:15px; }
    .sensor-item { background: white; padding: 15px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1);}
    .value-wrapper { font-size: 1.5rem; font-weight: bold; margin-top: 5px; }
    .unit { font-size: 0.8rem; color: #555; }
    .alert-high { color: #ef4444; font-weight:bold; }

    /* Botón de control envío */
    .control-envio { text-align:center; margin: 20px 0; }
    .control-envio button { background:#3b82f6; color:white; border:none; padding:10px 20px; border-radius:5px; font-size:1rem; cursor:pointer; }
    .control-envio button:hover { background:#2563eb; }

    /* Notificaciones estilo toast */
    #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
    .toast { display:flex; align-items:center; background:white; padding:10px 15px; margin-bottom:10px; border-left:5px solid #f59e0b; border-radius:5px; box-shadow:0 2px 6px rgba(0,0,0,0.2);}
    .toast-icon { margin-right:10px; }
    .toast-title { font-weight:bold; margin-bottom:2px; }
    .toast-message { font-size:0.9rem; }
    .toast-close { margin-left:auto; background:none; border:none; font-size:1.2rem; cursor:pointer; color:#555; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>Monitoreo de Sensores</h1>
    <p class="subtitle">Datos en tiempo real desde Firebase</p>
  </header>

  <div class="control-envio">
    <button id="toggleEnvio">Activar Envío a Firebase</button>
  </div>

  <div class="sensor-grid">
    <div class="sensor-item temp-agua">
      <div class="icon-label"><i class="fas fa-water"></i> Temperatura Agua</div>
      <div class="value-wrapper"><span id="waterTemp">--</span><span class="unit">°C</span></div>
    </div>
    <div class="sensor-item temp-amb">
      <div class="icon-label"><i class="fas fa-thermometer-half"></i> Temp. Ambiente</div>
      <div class="value-wrapper"><span id="dhtTemp">--</span><span class="unit">°C</span></div>
    </div>
    <div class="sensor-item humedad">
      <div class="icon-label"><i class="fas fa-tint"></i> Humedad</div>
      <div class="value-wrapper"><span id="hum">--</span><span class="unit">%</span></div>
    </div>
    <div class="sensor-item ph">
      <div class="icon-label"><i class="fas fa-vial"></i> pH</div>
      <div class="value-wrapper" id="ph">--</div>
    </div>
    <div class="sensor-item tds">
      <div class="icon-label"><i class="fas fa-filter"></i> TDS</div>
      <div class="value-wrapper"><span id="tds">--</span><span class="unit">ppm</span></div>
    </div>
    <div class="sensor-item ec">
      <div class="icon-label"><i class="fas fa-bolt"></i> EC</div>
      <div class="value-wrapper"><span id="ec">--</span><span class="unit">mS/cm</span></div>
    </div>
    <div class="sensor-item nivel">
      <div class="icon-label"><i class="fas fa-ruler-vertical"></i> Nivel</div>
      <div class="value-wrapper"><span id="nivel">--</span><span class="unit">cm</span></div>
    </div>
  </div>
</div>

<!-- Contenedor de notificaciones -->
<div id="toast-container"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBXAal12oFlxKZ81PlaDNnar_y2-DiZRlU",
    authDomain: "esp32-a7ac9.firebaseapp.com",
    databaseURL: "https://esp32-a7ac9-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "esp32-a7ac9",
    storageBucket: "esp32-a7ac9.firebasestorage.app",
    messagingSenderId: "312730525959",
    appId: "1:312730525959:web:dae44f28a4149dcee165a2"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const sensoresRef = ref(db, "sensores");

  // Rango óptimo pH para tomate
  const PH_MIN = 5.5;
  const PH_MAX = 6.5;
  let currentPH = null;

  // Función para mostrar notificación pH
  function showPHToast(value) {
    const container = document.getElementById("toast-container");
    const toast = document.createElement("div");
    toast.className = "toast";
    const isHigh = value > PH_MAX;
    const color = isHigh ? "#ef4444" : "#f59e0b";
    const title = isHigh ? "⚠️ pH muy alto" : "⚠️ pH muy bajo";
    const message = `El pH del agua es <strong>${value}</strong>. Rango ideal: ${PH_MIN}–${PH_MAX}.`;

    toast.style.borderLeftColor = color;
    toast.innerHTML = `
      <div class="toast-icon">
        <i class="fas fa-exclamation-triangle" style="color: ${color}"></i>
      </div>
      <div class="toast-content">
        <div class="toast-title">${title}</div>
        <div class="toast-message">${message}</div>
      </div>
      <button class="toast-close">&times;</button>
    `;
    container.appendChild(toast);
    toast.querySelector(".toast-close").addEventListener("click", () => toast.remove());
    setTimeout(() => { if (toast.parentNode) toast.remove(); }, 6000);
  }

  // Escuchar cambios en tiempo real
  onValue(sensoresRef, (snapshot) => {
    const d = snapshot.val();
    if (!d) return;

    const update = (id, val) => {
      const el = document.getElementById(id);
      if (el) el.textContent = (val != null && !isNaN(Number(val))) ? Number(val).toFixed(1) : "--";
    };

    update("waterTemp", d.waterTemp);
    update("dhtTemp", d.dhtTemp);
    update("hum", d.hum);
    update("tds", d.tds);
    update("ec", d.ec);
    update("nivel", d.nivel);

    const phNum = parseFloat(d.ph);
    if (!isNaN(phNum)) {
      currentPH = phNum;
      const phEl = document.getElementById("ph");
      phEl.textContent = phNum.toFixed(2);
      if (phNum < PH_MIN || phNum > PH_MAX) phEl.classList.add("alert-high");
      else phEl.classList.remove("alert-high");
    } else {
      currentPH = null;
      document.getElementById("ph").textContent = "--";
      document.getElementById("ph").classList.remove("alert-high");
    }

    // Si el envío está activo, hacemos fetch al ESP32
    if (envioActivo) {
      fetch("/enviar/on").catch(err => console.log("Error envio ESP32:", err));
    }
  });

  // Botón de activar/desactivar envío
  let envioActivo = false;
  const btnEnvio = document.getElementById("toggleEnvio");
  btnEnvio.addEventListener("click", () => {
    envioActivo = !envioActivo;
    btnEnvio.textContent = envioActivo ? "Desactivar Envío a Firebase" : "Activar Envío a Firebase";

    // Enviar flag al ESP32
    fetch(envioActivo ? "/enviar/on" : "/enviar/off")
      .then(r => console.log("Envio al ESP32:", envioActivo ? "ON" : "OFF"))
      .catch(err => console.log("Error envio ESP32:", err));
  });

  // Notificación periódica pH fuera de rango
  setInterval(() => {
    if (currentPH !== null && (currentPH < PH_MIN || currentPH > PH_MAX)) {
      showPHToast(currentPH.toFixed(2));
    }
  }, 10000);

</script>
</body>
</html>
