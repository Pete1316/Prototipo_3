<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Sensor pH</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #4CAF50, #2E7D32);
        margin: 0;
        padding: 0;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    /* Cuadro principal */
    .ph-card {
        background: white;
        color: black;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        width: 350px;
        text-align: center;
    }

    .ph-card h2 {
        margin-bottom: 20px;
    }

    /* Contenedor de subcuadros */
    .sub-cards {
        display: flex;
        gap: 15px;
        justify-content: center;
    }

    /* Subcuadros */
    .sub-card {
        background: #f0f0f0;
        padding: 15px;
        border-radius: 10px;
        width: 140px;
    }

    .label {
        font-size: 14px;
        color: #555;
    }

    .value {
        font-size: 28px;
        font-weight: bold;
        margin-top: 5px;
    }

    .estado {
        font-size: 20px;
        font-weight: bold;
        margin-top: 5px;
    }
</style>
</head>
<body>

<div class="ph-card">
    <h2>Sensor de pH</h2>

    <div class="sub-cards">
        <!-- Subcuadro pH -->
        <div class="sub-card">
            <div class="label">Valor pH</div>
            <div class="value" id="phValue">4.3</div>
        </div>

        <!-- Subcuadro Estado -->
        <div class="sub-card">
            <div class="label">Estado</div>
            <div class="estado" id="phEstado">Transición</div>
        </div>
    </div>
</div>

<script>
function obtenerEstadoPH(ph) {
    if (ph >= 4.0 && ph < 4.2) return "Inicio";
    if (ph >= 4.2 && ph < 4.4) return "Transición";
    if (ph >= 4.4 && ph < 4.7) return "Maduro";
    if (ph >= 4.7) return "Final";
    return "Desconocido";
}

// Simulación de lectura de pH
function actualizarPH() {
    let ph = (4 + Math.random()).toFixed(2); // valor entre 4.00 y 5.00
    document.getElementById("phValue").textContent = ph;
    document.getElementById("phEstado").textContent = obtenerEstadoPH(parseFloat(ph));
}

// Actualiza cada 2 segundos
setInterval(actualizarPH, 2000);
</script>

</body>
</html>
