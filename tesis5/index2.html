<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>🌿 Monitor Arduino IoT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #4361ee;
      --success: #06d6a0;
      --warning: #ffd166;
      --danger: #ef476f;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --shadow: rgba(0, 0, 0, 0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .header h1 {
      font-weight: 700;
      font-size: 28px;
      background: linear-gradient(90deg, var(--primary), #3a0ca3);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 8px;
    }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 14px;
      color: var(--muted);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
    }

    .status-dot.offline {
      background: var(--danger);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 700px;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 24px 20px;
      box-shadow: 0 6px 20px var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 25px var(--shadow);
    }

    .icon {
      margin-bottom: 14px;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon svg {
      width: 100%;
      height: 100%;
      fill: var(--primary);
    }

    .label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .value {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      transition: all 0.3s ease;
    }

    .value.ph-warning { color: var(--warning); }
    .value.ph-danger { color: var(--danger); }
    .value.ph-good { color: var(--success); }

    .controls {
      margin-top: 30px;
      text-align: center;
    }

    .btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px 28px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 4px 12px rgba(67, 97, 238, 0.3);
    }

    .btn:hover {
      background: #3a56e0;
      transform: scale(1.03);
    }

    .btn:active {
      transform: scale(1);
    }

    .btn:disabled {
      background: #cbd5e1;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .last-update {
      margin-top: 16px;
      font-size: 13px;
      color: var(--muted);
    }

    @media (max-width: 500px) {
      .dashboard {
        grid-template-columns: 1fr 1fr;
      }
      .header h1 {
        font-size: 24px;
      }
    }

    @media (max-width: 360px) {
      .dashboard {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🌿 Monitor Arduino IoT</h1>
    <div class="status-bar">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Conectando...</span>
    </div>
  </div>

  <div class="dashboard">
    <div class="card">
      <div class="icon">
        <svg viewBox="0 0 24 24"><path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4M12,6A6,6 0 0,0 6,12A6,6 0 0,0 12,18A6,6 0 0,0 18,12A6,6 0 0,0 12,6M12,8A4,4 0 0,1 16,12A4,4 0 0,1 12,16A4,4 0 0,1 8,12A4,4 0 0,1 12,8Z" /></svg>
      </div>
      <div class="label">pH</div>
      <div id="ph" class="value">--</div>
    </div>

    <div class="card">
      <div class="icon">
        <svg viewBox="0 0 24 24"><path d="M12,15.5A3.5,3.5 0 0,1 8.5,12A3.5,3.5 0 0,1 12,8.5A3.5,3.5 0 0,1 15.5,12A3.5,3.5 0 0,1 12,15.5M19.43,12.97C19.47,12.65 19.5,12.33 19.5,12C19.5,11.67 19.47,11.34 19.43,11L21.54,9.37C21.73,9.22 21.78,8.95 21.66,8.73L19.66,5.27C19.54,5.05 19.27,4.97 19.05,5.05L16.56,6.05C16.04,5.66 15.48,5.33 14.89,5.07L14.5,2.42C14.47,2.18 14.27,2 14,2H10C9.73,2 9.53,2.18 9.5,2.42L9.11,5.07C8.52,5.33 7.96,5.66 7.44,6.05L4.95,5.05C4.73,4.97 4.46,5.05 4.34,5.27L2.34,8.73C2.22,8.95 2.27,9.22 2.46,9.37L4.57,11C4.53,11.34 4.5,11.67 4.5,12C4.5,12.33 4.53,12.65 4.57,12.97L2.46,14.63C2.27,14.78 2.22,15.05 2.34,15.27L4.34,18.73C4.46,18.95 4.73,19.03 4.95,18.95L7.44,17.94C7.96,18.34 8.52,18.66 9.11,18.93L9.5,21.58C9.53,21.82 9.73,22 10,22H14C14.27,22 14.47,21.82 14.5,21.58L14.89,18.93C15.48,18.66 16.04,18.34 16.56,17.94L19.05,18.95C19.27,19.03 19.54,18.95 19.66,18.73L21.66,15.27C21.78,15.05 21.73,14.78 21.54,14.63L19.43,12.97Z" /></svg>
      </div>
      <div class="label">Temperatura</div>
      <div id="temp" class="value">-- °C</div>
    </div>

    <div class="card">
      <div class="icon">
        <svg viewBox="0 0 24 24"><path d="M12,3L13.5,5.5L16.5,6L14,8L14.5,11L12,9.5L9.5,11L10,8L7.5,6L10.5,5.5L12,3M13,13.5C13,14.33 12.33,15 11.5,15C10.67,15 10,14.33 10,13.5C10,12.67 10.67,12 11.5,12C12.33,12 13,12.67 13,13.5M19,3H18V2H16V3H8V2H6V3H5C3.89,3 3,3.89 3,5V21C3,22.11 3.89,23 5,23H19C20.11,23 21,22.11 21,21V5C21,3.89 20.11,3 19,3Z" /></svg>
      </div>
      <div class="label">Humedad</div>
      <div id="hum" class="value">-- %</div>
    </div>

    <div class="card">
      <div class="icon">
        <svg viewBox="0 0 24 24"><path d="M12,3L1,9L12,15L21,10.09L12,3M5,11.15V19.5L12,22.82L19,19.5V11.15L12,15L5,11.15M12,1L23,7L12,13L1,7L12,1Z" /></svg>
      </div>
      <div class="label">Nivel</div>
      <div id="nivel" class="value">--</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="btn-actualizar" onclick="manualUpdate()">Actualizar ahora</button>
    <div class="last-update" id="last-update">Nunca actualizado</div>
  </div>

  <script>
    const URL = "http://192.168.100.8/data"; // ← RUTA CORRECTA
    let lastFetch = null;
    let fetching = false;

    function updateStatus(online = true, msg = "") {
      const dot = document.getElementById("status-dot");
      const text = document.getElementById("status-text");
      dot.className = online ? "status-dot" : "status-dot offline";
      text.textContent = msg || (online ? "En línea" : "Desconectado");
    }

    function formatTime(date) {
      return date.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function applyPhStyle(element, ph) {
      element.className = "value";
      if (ph >= 0 && ph <= 6) element.classList.add("ph-danger");
      else if (ph > 6 && ph < 9) element.classList.add("ph-good");
      else if (ph >= 9 && ph <= 14) element.classList.add("ph-warning");
    }

    async function fetchData() {
      if (fetching) return;
      fetching = true;
      const btn = document.getElementById("btn-actualizar");
      const originalText = btn.textContent;
      btn.textContent = "Actualizando...";
      btn.disabled = true;

      try {
        const res = await fetch(URL, { cache: "no-store" });
        if (!res.ok) throw new Error(`Error ${res.status}`);
        const data = await res.json();

        // Validación básica
        if (typeof data.ph !== 'number') throw new Error("Datos inválidos");

        // Actualizar valores
        const phEl = document.getElementById("ph");
        phEl.textContent = data.ph.toFixed(1);
        applyPhStyle(phEl, data.ph);

        document.getElementById("temp").textContent = (data.temp ?? "--") + " °C";
        document.getElementById("hum").textContent = (data.hum ?? "--") + " %";
        document.getElementById("nivel").textContent = data.nivel ?? "--";

        lastFetch = new Date();
        document.getElementById("last-update").textContent = `Última actualización: ${formatTime(lastFetch)}`;
        updateStatus(true);
      } catch (err) {
        console.error("Error al obtener datos:", err);
        updateStatus(false, "Error de conexión");
      } finally {
        fetching = false;
        btn.disabled = false;
        btn.textContent = originalText;
      }
    }

    function manualUpdate() {
      fetchData();
    }

    // Iniciar
    fetchData();
    setInterval(fetchData, 5000); // Cada 5 segundos
  </script>
</body>
</html>
