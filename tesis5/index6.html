<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Dashboard IoT – Arduino ENC28J60</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  body {
    font-family: "Segoe UI", Arial;
    background: var(--bg);
    color: var(--text);
    transition: 0.3s;
  }
  
  :root {
    --bg: #f2f4f7;
    --text: #111;
    --card-bg: #fff;
  }
  [data-theme="dark"] {
    --bg: #121212;
    --text: #eaeaea;
    --card-bg: #1e1e1e;
  }

  .card {
    border: none;
    border-radius: 16px;
    background: var(--card-bg);
    box-shadow: 0 4px 18px rgba(0,0,0,0.15);
  }

  .valor {
    font-size: 38px;
    font-weight: 700;
  }

  /* Nivel animado */
  .nivel-box {
    width: 100%;
    height: 180px;
    border-radius: 14px;
    background: #d1e7ff;
    position: relative;
    overflow: hidden;
  }
  .nivel-agua {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: #0d6efd;
    transition: height 0.5s ease;
  }
</style>

</head>
<body data-theme="light">

<div class="container py-4">

  <h2 class="text-center mb-2">Dashboard IoT – Hidroponía</h2>
  <p class="text-center text-muted mb-4">Arduino Nano + ENC28J60</p>

  <div class="text-center mb-4">
    <button class="btn btn-dark" onclick="toggleTheme()">Modo Oscuro / Claro</button>
  </div>

  <div class="row g-4">

    <!-- pH Gauge -->
    <div class="col-12 col-md-4">
      <div class="card p-3 text-center">
        <h5 class="text-muted">pH</h5>
        <canvas id="phGauge" width="250" height="150"></canvas>
        <div id="phVal" class="valor mt-2">--</div>
      </div>
    </div>

    <!-- Temperatura Gauge -->
    <div class="col-12 col-md-4">
      <div class="card p-3 text-center">
        <h5 class="text-muted">Temperatura</h5>
        <canvas id="tempGauge" width="250" height="150"></canvas>
        <div id="tempVal" class="valor mt-2">-- °C</div>
      </div>
    </div>

    <!-- Humedad Gauge -->
    <div class="col-12 col-md-4">
      <div class="card p-3 text-center">
        <h5 class="text-muted">Humedad</h5>
        <canvas id="humGauge" width="250" height="150"></canvas>
        <div id="humVal" class="valor mt-2">-- %</div>
      </div>
    </div>

    <!-- Nivel de agua -->
    <div class="col-12">
      <div class="card p-4 text-center">
        <h5 class="text-muted mb-3">Nivel de Agua</h5>
        <div class="nivel-box mx-auto">
          <div id="nivelAgua" class="nivel-agua" style="height:20%"></div>
        </div>
        <div id="nivel" class="valor mt-3">--</div>
      </div>
    </div>

  </div>

  <!-- Gráficas -->
  <h4 class="mt-5">Gráficas en Tiempo Real</h4>

  <div class="row g-4 mt-1">

    <div class="col-12 col-md-4">
      <div class="card p-3">
        <h6 class="text-muted">pH</h6>
        <canvas id="chartPH"></canvas>
      </div>
    </div>

    <div class="col-12 col-md-4">
      <div class="card p-3">
        <h6 class="text-muted">Temperatura</h6>
        <canvas id="chartTEMP"></canvas>
      </div>
    </div>

    <div class="col-12 col-md-4">
      <div class="card p-3">
        <h6 class="text-muted">Humedad</h6>
        <canvas id="chartHUM"></canvas>
      </div>
    </div>

  </div>

</div>

<script>

const URL = "http://192.168.100.8/data";

/* ===============================
      1) GAUGES – ARC MODERNOS
================================= */

function drawArcGauge(canvasId, value, max, color) {
  let c = document.getElementById(canvasId);
  let ctx = c.getContext("2d");

  ctx.clearRect(0, 0, c.width, c.height);

  let centerX = c.width / 2;
  let centerY = c.height * 0.9;
  let radius = c.width * 0.35;

  let start = Math.PI;
  let end = 0;

  // fondo
  ctx.beginPath();
  ctx.lineWidth = 20;
  ctx.strokeStyle = "#dadce0";
  ctx.lineCap = "round";
  ctx.arc(centerX, centerY, radius, start, end, false);
  ctx.stroke();

  // valor
  let angle = start + (value / max) * (end - start);

  ctx.beginPath();
  ctx.strokeStyle = color;
  ctx.lineWidth = 20;
  ctx.lineCap = "round";
  ctx.arc(centerX, centerY, radius, start, angle, false);
  ctx.stroke();
}


/* ===============================
      2) GRÁFICAS
================================= */

function crearGrafica(ctx, label) {
  return new Chart(ctx, {
    type: "line",
    data: {
      labels: [],
      datasets: [{
        label: label,
        data: [],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      animation: false,
      plugins: { legend: { display: false } },
      scales: { x: { display: false } }
    }
  });
}

let chartPH = crearGrafica(document.getElementById("chartPH"), "pH");
let chartTEMP = crearGrafica(document.getElementById("chartTEMP"), "Temp");
let chartHUM = crearGrafica(document.getElementById("chartHUM"), "Hum");

/* ===============================
      3) MODO OSCURO
================================= */

function toggleTheme() {
  document.body.dataset.theme =
    (document.body.dataset.theme === "dark") ? "light" : "dark";
}

/* ===============================
      4) CARGA DE DATOS
================================= */

async function cargar() {
  try {
    const r = await fetch(URL, { cache: "no-store" });
    const j = await r.json();

    /* === pH === */
    document.getElementById("phVal").textContent = j.ph;
    drawArcGauge("phGauge", j.ph, 14, "#4CC9F0");

    chartPH.data.labels.push("");
    chartPH.data.datasets[0].data.push(j.ph);
    if(chartPH.data.datasets[0].data.length > 20) chartPH.data.datasets[0].data.shift();
    chartPH.update();

    /* === Temperatura === */
    document.getElementById("tempVal").textContent = j.temp + " °C";
    drawArcGauge("tempGauge", j.temp, 60, "#F72585");

    chartTEMP.data.labels.push("");
    chartTEMP.data.datasets[0].data.push(j.temp);
    if(chartTEMP.data.datasets[0].data.length > 20) chartTEMP.data.datasets[0].data.shift();
    chartTEMP.update();

    /* === Humedad === */
    document.getElementById("humVal").textContent = j.hum + " %";
    drawArcGauge("humGauge", j.hum, 100, "#7209B7");

    chartHUM.data.labels.push("");
    chartHUM.data.datasets[0].data.push(j.hum);
    if(chartHUM.data.datasets[0].data.length > 20) chartHUM.data.datasets[0].data.shift();
    chartHUM.update();

    /* === Nivel de agua === */
    document.getElementById("nivel").textContent = j.nivel;
    document.getElementById("nivelAgua").style.height =
      (j.nivel === "OK" ? "80%" : "20%");

  } catch (e) {
    console.log("Error:", e);
  }
}

setInterval(cargar, 1000);
cargar();

</script>

</body>
</html>
