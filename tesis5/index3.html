<!DOCTYPE html>
<html lang="es" id="html-root">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>🌿 Monitor Arduino IoT Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <!-- Chart.js ligero (solo lo necesario) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --primary: #4361ee;
      --success: #06d6a0;
      --warning: #ffd166;
      --danger: #ef476f;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --shadow: rgba(0, 0, 0, 0.08);
    }

    [data-theme="dark"] {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --shadow: rgba(0, 0, 0, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
      min-height: 100vh;
      transition: background 0.3s;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .header h1 {
      font-weight: 700;
      font-size: 26px;
      background: linear-gradient(90deg, var(--primary), #3a0ca3);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .theme-toggle {
      background: var(--card);
      border: 1px solid var(--muted);
      width: 50px;
      height: 26px;
      border-radius: 13px;
      position: relative;
      cursor: pointer;
      display: flex;
      align-items: center;
      padding: 2px;
    }

    .theme-toggle::after {
      content: "🌙";
      position: absolute;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: white;
      left: 2px;
      transition: transform 0.3s;
    }

    [data-theme="dark"] .theme-toggle::after {
      content: "☀️";
      transform: translateX(24px);
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--muted);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
    }

    .status-dot.offline {
      background: var(--danger);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 18px;
      margin-bottom: 24px;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 6px 16px var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.2s;
    }

    .card:hover {
      transform: translateY(-3px);
    }

    .icon {
      margin-bottom: 12px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon svg {
      width: 100%;
      height: 100%;
      fill: var(--primary);
    }

    .label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .value {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
    }

    .value.ph-warning { color: var(--warning); }
    .value.ph-danger { color: var(--danger); }
    .value.ph-good { color: var(--success); }

    #chart-container {
      background: var(--card);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 6px 16px var(--shadow);
      margin-bottom: 20px;
      height: 200px;
    }

    .controls {
      text-align: center;
    }

    .btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 10px 24px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover { background: #3a56e0; }

    .alert {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--danger);
      color: white;
      padding: 12px 20px;
      border-radius: 10px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
      transform: translateX(200%);
      transition: transform 0.3s ease;
      z-index: 1000;
    }

    .alert.show {
      transform: translateX(0);
    }

    .last-update {
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
    }

    @media (max-width: 500px) {
      .toolbar { flex-direction: column; align-items: stretch; }
      .theme-toggle { align-self: flex-end; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="header">
      <h1>🌿 Monitor Arduino IoT Pro</h1>
      <div class="status-bar">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Conectando...</span>
      </div>
    </div>
    <div class="theme-toggle" id="theme-toggle"></div>
  </div>

  <div class="dashboard">
    <div class="card">
      <div class="icon">
        <svg viewBox="0 0 24 24"><path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4M12,6A6,6 0 0,0 6,12A6,6 0 0,0 12,18A6,6 0 0,0 18,12A6,6 0 0,0 12,6M12,8A4,4 0 0,1 16,12A4,4 0 0,1 12,16A4,4 0 0,1 8,12A4,4 0 0,1 12,8Z" /></svg>
      </div>
      <div class="label">pH</div>
      <div id="ph" class="value">--</div>
    </div>

    <div class="card">
      <div class="icon">
        <svg viewBox="0 0 24 24"><path d="M12,15.5A3.5,3.5 0 0,1 8.5,12A3.5,3.5 0 0,1 12,8.5A3.5,3.5 0 0,1 15.5,12A3.5,3.5 0 0,1 12,15.5M19.43,12.97C19.47,12.65 19.5,12.33 19.5,12C19.5,11.67 19.47,11.34 19.43,11L21.54,9.37C21.73,9.22 21.78,8.95 21.66,8.73L19.66,5.27C19.54,5.05 19.27,4.97 19.05,5.05L16.56,6.05C16.04,5.66 15.48,5.33 14.89,5.07L14.5,2.42C14.47,2.18 14.27,2 14,2H10C9.73,2 9.53,2.18 9.5,2.42L9.11,5.07C8.52,5.33 7.96,5.66 7.44,6.05L4.95,5.05C4.73,4.97 4.46,5.05 4.34,5.27L2.34,8.73C2.22,8.95 2.27,9.22 2.46,9.37L4.57,11C4.53,11.34 4.5,11.67 4.5,12C4.5,12.33 4.53,12.65 4.57,12.97L2.46,14.63C2.27,14.78 2.22,15.05 2.34,15.27L4.34,18.73C4.46,18.95 4.73,19.03 4.95,18.95L7.44,17.94C7.96,18.34 8.52,18.66 9.11,18.93L9.5,21.58C9.53,21.82 9.73,22 10,22H14C14.27,22 14.47,21.82 14.5,21.58L14.89,18.93C15.48,18.66 16.04,18.34 16.56,17.94L19.05,18.95C19.27,19.03 19.54,18.95 19.66,18.73L21.66,15.27C21.78,15.05 21.73,14.78 21.54,14.63L19.43,12.97Z" /></svg>
      </div>
      <div class="label">Temperatura</div>
      <div id="temp" class="value">-- °C</div>
    </div>

    <div class="card">
      <div class="icon">
        <svg viewBox="0 0 24 24"><path d="M12,3L13.5,5.5L16.5,6L14,8L14.5,11L12,9.5L9.5,11L10,8L7.5,6L10.5,5.5L12,3M13,13.5C13,14.33 12.33,15 11.5,15C10.67,15 10,14.33 10,13.5C10,12.67 10.67,12 11.5,12C12.33,12 13,12.67 13,13.5M19,3H18V2H16V3H8V2H6V3H5C3.89,3 3,3.89 3,5V21C3,22.11 3.89,23 5,23H19C20.11,23 21,22.11 21,21V5C21,3.89 20.11,3 19,3Z" /></svg>
      </div>
      <div class="label">Humedad</div>
      <div id="hum" class="value">-- %</div>
    </div>

    <div class="card">
      <div class="icon">
        <svg viewBox="0 0 24 24"><path d="M12,3L1,9L12,15L21,10.09L12,3M5,11.15V19.5L12,22.82L19,19.5V11.15L12,15L5,11.15M12,1L23,7L12,13L1,7L12,1Z" /></svg>
      </div>
      <div class="label">Nivel</div>
      <div id="nivel" class="value">--</div>
    </div>
  </div>

  <div id="chart-container">
    <canvas id="live-chart"></canvas>
  </div>

  <div class="controls">
    <button class="btn" id="btn-actualizar" onclick="manualUpdate()">Actualizar ahora</button>
    <div class="last-update" id="last-update">Nunca actualizado</div>
  </div>

  <div class="alert" id="alert">⚠️ Alerta de pH alto</div>

  <script>
    // === CONFIGURACIÓN ===
    const URL = "http://192.168.100.8/data";
    const UPDATE_INTERVAL = 1000; // 1 segundo
    const MAX_HISTORY = 50; // Máximo de puntos en gráfico

    // Rangos seguros
    const SAFE_PH = { min: 6.0, max: 8.5 };
    const SAFE_TEMP = { min: 15, max: 30 };

    // === Estado ===
    let lastFetch = null;
    let fetching = false;
    let abortController = null;
    let alertTimeout = null;
    const history = JSON.parse(localStorage.getItem('arduinoHistory')) || {
      timestamps: [],
      ph: [],
      temp: [],
      hum: [],
      nivel: []
    };

    // === Inicialización ===
    document.addEventListener('DOMContentLoaded', () => {
      setupTheme();
      setupChart();
      fetchData();
      setInterval(() => {
        if (!fetching) fetchData();
      }, UPDATE_INTERVAL);
    });

    // === Tema oscuro/claro ===
    function setupTheme() {
      const toggle = document.getElementById('theme-toggle');
      const root = document.getElementById('html-root');
      const stored = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      root.setAttribute('data-theme', stored);
      toggle.addEventListener('click', () => {
        const newTheme = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        root.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
      });
    }

    // === Gráfico ===
    let liveChart = null;
    function setupChart() {
      const ctx = document.getElementById('live-chart').getContext('2d');
      liveChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: history.timestamps,
          datasets: [
            {
              label: 'pH',
              data: history.ph,
              borderColor: '#ef476f',
              backgroundColor: 'rgba(239, 71, 111, 0.1)',
              tension: 0.3,
              fill: true
            },
            {
              label: 'Temp (°C)',
              data: history.temp,
              borderColor: '#06d6a0',
              backgroundColor: 'rgba(6, 214, 160, 0.1)',
              tension: 0.3,
              fill: true
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          scales: {
            x: { display: false },
            y: {
              beginAtZero: false,
              grid: { color: 'rgba(148, 163, 184, 0.2)' }
            }
          },
          plugins: { legend: { labels: { color: 'var(--text)' } } }
        }
      });
    }

    function updateChart(ph, temp) {
      const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      
      // Agregar nuevos datos
      history.timestamps.push(now);
      history.ph.push(ph);
      history.temp.push(temp);

      // Limitar historial
      if (history.timestamps.length > MAX_HISTORY) {
        history.timestamps.shift();
        history.ph.shift();
        history.temp.shift();
      }

      // Guardar en localStorage
      localStorage.setItem('arduinoHistory', JSON.stringify(history));

      // Actualizar gráfico
      liveChart.data.labels = history.timestamps;
      liveChart.data.datasets[0].data = history.ph;
      liveChart.data.datasets[1].data = history.temp;
      liveChart.update();
    }

    // === Alertas ===
    function showAlert(message) {
      const alert = document.getElementById('alert');
      alert.textContent = `⚠️ ${message}`;
      alert.classList.add('show');
      if (alertTimeout) clearTimeout(alertTimeout);
      alertTimeout = setTimeout(() => alert.classList.remove('show'), 5000);

      // Sonido suave (opcional)
      if ('Notification' in window && Notification.permission === 'granted') {
        new Notification('Alerta Arduino', { body: message });
      } else if (Notification.permission !== 'denied') {
        Notification.requestPermission();
      }
    }

    // === Actualización de datos ===
    async function fetchData() {
      if (fetching) return;
      fetching = true;
      if (abortController) abortController.abort();
      abortController = new AbortController();

      try {
        const res = await fetch(URL, {
          cache: "no-store",
          signal: abortController.signal
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        if (typeof data.ph !== 'number') throw new Error("Datos inválidos");

        // Actualizar UI
        const phEl = document.getElementById("ph");
        phEl.textContent = data.ph.toFixed(1);
        applyPhStyle(phEl, data.ph);

        document.getElementById("temp").textContent = (data.temp ?? "--") + " °C";
        document.getElementById("hum").textContent = (data.hum ?? "--") + " %";
        document.getElementById("nivel").textContent = data.nivel ?? "--";

        // Actualizar gráfico
        updateChart(data.ph, data.temp);

        // Verificar alertas
        if (data.ph < SAFE_PH.min || data.ph > SAFE_PH.max) {
          showAlert(`pH fuera de rango: ${data.ph.toFixed(1)}`);
        }
        if (data.temp < SAFE_TEMP.min || data.temp > SAFE_TEMP.max) {
          showAlert(`Temperatura fuera de rango: ${data.temp}°C`);
        }

        // Estado
        lastFetch = new Date();
        document.getElementById("last-update").textContent = `Última: ${lastFetch.toLocaleTimeString()}`;
        updateStatus(true);

      } catch (err) {
        if (err.name !== 'AbortError') {
          console.error("Error:", err);
          updateStatus(false, "Error de conexión");
        }
      } finally {
        fetching = false;
      }
    }

    function manualUpdate() {
      fetchData();
    }

    function updateStatus(online = true, msg = "") {
      const dot = document.getElementById("status-dot");
      const text = document.getElementById("status-text");
      dot.className = online ? "status-dot" : "status-dot offline";
      text.textContent = msg || (online ? "En línea" : "Desconectado");
    }

    function applyPhStyle(element, ph) {
      element.className = "value";
      if (ph < SAFE_PH.min || ph > SAFE_PH.max) element.classList.add("ph-danger");
      else if (ph > SAFE_PH.max - 0.5 || ph < SAFE_PH.min + 0.5) element.classList.add("ph-warning");
      else element.classList.add("ph-good");
    }
  </script>
</body>
</html>
