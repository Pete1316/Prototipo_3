<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Control Bomba</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .led {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: red;
      box-shadow: 0 0 6px red;
    }
    .on {
      background: #28a745;
      box-shadow: 0 0 6px #28a745;
    }
    .off {
      background: #dc3545;
      box-shadow: 0 0 6px #dc3545;
    }
  </style>
</head>

<body class="bg-light">

<div class="container mt-5">

  <div class="row justify-content-center">
    <div class="col-md-4">

      <div class="card p-4 position-relative">
        <h5 class="text-center">Bomba de Agua</h5>

        <!-- LED -->
        <span id="ledBomba" class="led off"></span>

        <!-- Botones -->
        <div class="btn-group w-100 mt-4">
          <button class="btn btn-primary" onclick="bombaON()">ENCENDER</button>
          <button class="btn btn-danger" onclick="bombaOFF()">APAGAR</button>
        </div>

      </div>

    </div>
  </div>

</div>

<script>
  const ipESP32 = "192.168.0.102"; // CAMBIA por tu IP

  function bombaON() {
    fetch(`http://${ipESP32}/bomba/on`)
      .then(() => {
        document.getElementById("ledBomba").className = "led on";
      })
      .catch(() => alert("Error al encender bomba"));
  }

  function bombaOFF() {
    fetch(`http://${ipESP32}/bomba/off`)
      .then(() => {
        document.getElementById("ledBomba").className = "led off";
      })
      .catch(() => alert("Error al apagar bomba"));
  }
</script>

</body>
</html>
