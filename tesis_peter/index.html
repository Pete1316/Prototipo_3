<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panel Hidropónico</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="estilo.css">
</head>

<body>
<div class="container">

  

  <!-- ================== SENSORES ================== -->
  <div class="row mb-4">

    <div class="col-md-6 col-lg-3 mb-3">
      <div class="card bg-light">
        <div class="card-body">
          <h5>Temperatura</h5>
          <p class="fs-4"><span id="temp">0</span> °C</p>
        </div>
      </div>
    </div>

    <div class="col-md-6 col-lg-3 mb-3">
      <div class="card bg-light">
        <div class="card-body">
          <h5>TDS</h5>
          <p class="fs-4"><span id="tds">0</span></p>
        </div>
      </div>
    </div>

    <div class="col-md-6 col-lg-3 mb-3">
      <div class="card bg-light">
        <div class="card-body">
          <h5>pH</h5>
          <p class="fs-4"><span id="ph">0</span></p>
        </div>
      </div>
    </div>

    <div class="col-md-6 col-lg-3 mb-3">
      <div class="card bg-light">
        <div class="card-body">
          <h5>EC</h5>
          <p class="fs-4"><span id="ec">0</span></p>
        </div>
      </div>
    </div>

    <div class="col-md-6 col-lg-3 mb-3">
      <div class="card bg-light">
        <div class="card-body">
          <h5>Temperatura A</h5>
          <p class="fs-4"><span id="dhtTemp">0</span></p>
        </div>
      </div>
    </div>

    <div class="col-md-6 col-lg-3 mb-3">
      <div class="card bg-light">
        <div class="card-body">
          <h5>Humedad A</h5>
          <p class="fs-4"><span id="hum">0</span></p>
        </div>
      </div>
    </div>

    <div class="col-md-6 col-lg-3 mb-3">
      <div class="card bg-light">
        <div class="card-body">
          <h5>Nivel</h5>
          <p class="fs-4"><span id="nivel">0</span></p>
        </div>
      </div>
    </div>

  </div>



  

  <!-- ================== CONTROLES ================== -->
  <!-- =============================================== -->
  <div class="row">

    <div class="col-md-6 mb-4">
      <div class="card p-4">
        <h5>Bomba de agua</h5>
        <div class="btn-group w-100 mt-3">
          <button class="btn btn-primary" id="btnOn" onclick="controlLED('on')">ENCENDER</button>
          <button class="btn btn-primary" id="btnOff" onclick="controlLED('off')">APAGAR</button>
        </div>
      </div>
    </div>
     <!-- =============================================== -->

    <div class="col-md-6 mb-4">
      <div class="card p-4">
        <h5>Control Ventilador</h5>
        <div class="btn-group w-100 mt-3">
          <button class="btn btn-primary" id ="btnOn1" onclick="controlLED('on1')">ENCENDER</button>
          <button class="btn btn-primary" id ="btnOff1" onclick="controlLED('off1')">APAGAR</button>
        </div>
      </div>
    </div>
     <!-- =============================================== -->


    <div class="col-md-6 mb-4">
      <div class="card p-4">
        <h5>Medir</h5>
        <div class="btn-group w-100 mt-3">
          <button class="btn btn-primary" id ="btnOn2" onclick="controlLED('on2')">pH</button>
          <button class="btn btn-primary" id ="btnOff2" onclick="controlLED('off2')">TDS</button>
        </div>
      </div>
    </div>

     <!-- =============================================== -->

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
