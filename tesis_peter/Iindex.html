<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Panel Hidropónico</title>
  <link rel="stylesheet" href="estilo.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>
  <h1>Datos Hidropónicos</h1>


  <div class="container overflow-hidden">
    <div class="row gy-5">
      <div class="col-6">
            <div class="p-3 border bg-light">Temp: <span id="temp">0</span> °C</div>
            <div class="col-6">
              
            <div class="p-3 border bg-light">TDS: <span id="tds">0</span></div>
            </div>
            
            <div class="dato">PH: <span id="ph">0</span></div>
            <div class="dato">EC: <span id="ec">0</span></div>
            <div class="dato">Tem: <span id = "dhtTemp">0</span></div>
            <div class="dato">hum: <span id = "hum">0</span></div>
            <div class="dato">nivel:<span id = "nivel">0</span> </div>

      </div>
    </div>
  </div>



  <h2>Bomba de agua</h2>

   <!------------------------ -->
  <div class="btn-group">
  <button type="button" class="btn btn-primary" id="btnOn" onclick="controlLED('on')">ENCENDER</button>
  <button type="button" class="btn btn-danger" id="btnOff" onclick="controlLED('off')">APAGAR</button>
  </div>

   <!------------------------ -->
  <h2>Control Ventilador</h2>
  <div class="btn-group">
      <button type="button" class="btn btn-primary" id ="btnOn1"onclick="controlLED('on1')">ENCENDER</button>
  <button type="button" class="btn btn-danger" id ="btnOff1"onclick="controlLED('off1')">APAGAR</button>
  </div>

   <!------------------------ -->
  <h2>Medir</h2>
  <div class="btn-group">
      <button type="button" class="btn btn-primary" id ="btnOn2" onclick="controlLED('on2')">pH</button>
      <button type="button" class="btn btn-danger" id ="btnOff2" onclick="controlLED('off2')">TDS</button>
  </div>


  <!-- Vinculamos el archivo externo script.js -->
  <script src="script.js"></script>

</body>
</html>
